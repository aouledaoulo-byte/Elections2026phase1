name: Build Election Phase 1 APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
      - name: Write source files
        run: |
          mkdir -p /tmp/app/lib/models /tmp/app/lib/services /tmp/app/lib/screens
          python3 << 'PYEOF2'
          import base64, os
          files = {
            "pubspec.yaml": "",
            "lib/main.dart": "",
            "lib/models/models.dart": "",
            "lib/services/database_service.dart": "",
            "lib/screens/login_screen.dart": "",
            "lib/screens/agent_screen.dart": "",
            "lib/screens/superviseur_screen.dart": "",
          }
          for p,b in files.items():
            full='/tmp/app/'+p
            os.makedirs(os.path.dirname(full),exist_ok=True)
            open(full,'wb').write(base64.b64decode(b))
            print('wrote',full)
          PYEOF2
      - name: Create Flutter Android shell
        run: |
          flutter create --org com.djibouti \
            --project-name election_phase1 /tmp/shell
          cp -r /tmp/shell/android /tmp/app/android
      - name: Build APK
        run: |
          cd /tmp/app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: election-phase1-apk
          path: /tmp/app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
